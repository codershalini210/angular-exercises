<p>blog-post works!</p>
<h2>{{post.title | uppercase}}</h2>
<p><b>Author:</b> {{post.author}}</p>
<p><b>Published Date:</b>{{post.publishDate | date:"dd MMM yyyy"}}</p>
<p>{{post.content}}</p>
<button *ngIf="post.isEditable">Edit </button>
<h2>Comments</h2>
<p *ngFor="let comment of post.comments">
    {{comment}}
</p>
